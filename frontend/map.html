<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GeoRisk - Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #05060a;
      --bg-surface: #080b17;
      --bg-card: #0c1020;
      --bg-input: #121834;
      --border: rgba(255,255,255,0.06);
      --text-primary: #e2e6f0;
      --text-secondary: rgba(226,230,240,0.5);
      --text-muted: rgba(226,230,240,0.22);
      --blue: #3a7bd5;
      --purple: #8a4fc9;
      --amber: #d18a3a;
      --cyan: #22b8c8;
      --green: #2ecc71;
      --red: #e74c3c;
      --yellow: #f1c40f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-base); font-family: 'JetBrains Mono', 'Courier New', monospace; }

    #map {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    #controls {
      position: absolute;
      top: 16px; left: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 300px;
      pointer-events: none;
    }

    #controls > * { pointer-events: auto; }

    .ctrl-card {
      background: rgba(8,11,23,.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,.55);
    }

    .drag-handle {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      cursor: grab;
      user-select: none;
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 3px;
    }
    .drag-handle:active { cursor: grabbing; }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 8px;
    }

    .filter-group:last-of-type { margin-bottom: 0; }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-secondary);
    }

    .filter-group label svg {
      width: 12px; height: 12px;
      stroke: currentColor;
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      background: var(--bg-input);
      color: var(--text-primary);
      outline: none;
      transition: border-color .15s;
    }

    .filter-group input::placeholder { color: var(--text-muted); }
    .filter-group input:focus,
    .filter-group select:focus { border-color: var(--blue); }

    .filter-group select option { background: var(--bg-input); color: var(--text-primary); }

    .suggestions-wrap {
      position: relative;
    }

    #suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(8,11,23,.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }

    #suggestions.open { display: block; }

    #suggestions .s-item {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    #suggestions .s-item:last-child { border-bottom: none; }
    #suggestions .s-item:hover,
    #suggestions .s-item.active { background: rgba(58,123,213,0.1); color: var(--text-primary); }
    #suggestions .s-item .match { color: var(--blue); font-weight: 500; }
#suggestions .s-item .hint { font-size: 10px; color: var(--text-muted); margin-left: 6px; }

    .action-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .action-row select { flex: 1; }

    #btnCargar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, transform .15s;
    }

    #btnCargar:hover { background: #2d5fa8; transform: translateY(-1px); }
    #btnCargar:active { transform: scale(.97); }

    #btnCargar svg { width: 14px; height: 14px; }

    .kpi-wrap {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      pointer-events: none;
    }

    .kpi-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(8,11,23,.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      pointer-events: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      min-width: 105px;
    }

    .kpi-card .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .kpi-card .info { display: flex; flex-direction: column; }
    .kpi-card .value {
      font-weight: 700;
      font-size: 18px;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .kpi-card .label {
      color: var(--text-secondary);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .leaflet-popup-content {
      font-size: 13px;
      line-height: 1.5;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    .leaflet-popup-content b { color: #1a1d2e; }

    .leaflet-control-zoom a {
      background: rgba(8,11,23,.9) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }

    @media (max-width: 640px) {
      #controls { top: 10px; left: 10px; right: 10px; width: auto; max-width: none; }
      .kpi-wrap { bottom: 12px; gap: 4px; }
      .kpi-card { padding: 8px 12px; min-width: 75px; }
      .kpi-card .value { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="controls">
    <div class="ctrl-card" id="filterCard">
      <div class="drag-handle" id="dragHandle">&#8942;&#8942;&#8942;</div>

      <div class="filter-group suggestions-wrap">
        <label>
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21"/>
          </svg>
          Buscar
        </label>
        <input id="distritoSearch" type="text" placeholder="Departamento, provincia o distrito..." autocomplete="off" />
        <div id="suggestions"></div>
      </div>

      <div class="filter-group">
        <label>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <ellipse cx="12" cy="12" rx="4" ry="10"/>
            <path d="M2 12h20"/>
          </svg>
          Departamento
        </label>
        <select id="departamentoSelect"></select>
      </div>

      <div class="filter-group">
        <label>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <ellipse cx="12" cy="12" rx="4" ry="10"/>
            <path d="M2 12h20"/>
          </svg>
          Provincia
        </label>
        <select id="provinciaSelect"></select>
      </div>

      <div class="filter-group">
        <label>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <ellipse cx="12" cy="12" rx="4" ry="10"/>
            <path d="M2 12h20"/>
          </svg>
          Distrito
        </label>
        <select id="distritoSelect"></select>
      </div>

      <div class="action-row">
        <select id="gravedad">
          <option value="">(Todas)</option>
          <option value="Baja">Baja</option>
          <option value="Media">Media</option>
          <option value="Alta">Alta</option>
        </select>
        <button id="btnCargar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          Actualizar
        </button>
      </div>
    </div>
  </div>

  <div class="kpi-wrap" id="kpis">
    <div class="kpi-card">
      <span class="dot" style="background: var(--text-secondary)"></span>
      <div class="info">
        <div class="value" id="kpiTotal">0</div>
        <div class="label">Total</div>
      </div>
    </div>
    <div class="kpi-card">
      <span class="dot" style="background: var(--green)"></span>
      <div class="info">
        <div class="value" id="kpiBaja">0</div>
        <div class="label">Baja</div>
      </div>
    </div>
    <div class="kpi-card">
      <span class="dot" style="background: var(--yellow)"></span>
      <div class="info">
        <div class="value" id="kpiMedia">0</div>
        <div class="label">Media</div>
      </div>
    </div>
    <div class="kpi-card">
      <span class="dot" style="background: var(--red)"></span>
      <div class="info">
        <div class="value" id="kpiAlta">0</div>
        <div class="label">Alta</div>
      </div>
    </div>
    <div class="kpi-card">
      <span class="dot" style="background: var(--purple)"></span>
      <div class="info">
        <div class="value" id="kpiProm">0.0</div>
        <div class="label">Promedio</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
